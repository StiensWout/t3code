name: Fork CI

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
    branches:
      - staging/**

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: fork-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

  test:
    name: Test
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Test
        run: vp run test

  release_smoke:
    name: Release Smoke
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts
