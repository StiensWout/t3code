name: Fork CI

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
    branches:
      - staging/**

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: fork-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cancel_pending_pr_runs:
    name: Cancel Pending PR Runs
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'fork-ci' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Cancel stale CI workflow runs for this pull request
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          statuses=(queued in_progress)
          canceled=0
          failed=0

          for status in "${statuses[@]}"; do
            error_file="$(mktemp)"

            if ! runs="$(
              gh api --method GET --paginate \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${REPOSITORY}/actions/workflows/ci.yml/runs" \
                -f event=pull_request \
                -f status="${status}" \
                -f branch="${PR_HEAD_REF}" \
                -f per_page=100 \
                --jq ".workflow_runs[]
                  | select([.pull_requests[]?.number] | index(${PR_NUMBER}))
                  | [.id, .name, .status, .head_branch, .head_sha, .html_url]
                  | @tsv" \
                2>"${error_file}"
            )"; then
              cat "${error_file}" >&2
              rm -f "${error_file}"
              exit 1
            fi

            rm -f "${error_file}"

            if [ -z "${runs}" ]; then
              continue
            fi

            while IFS=$'\t' read -r run_id run_name run_status head_branch head_sha html_url; do
              if [ -z "${run_id}" ] || [ "${run_id}" = "${CURRENT_RUN_ID}" ]; then
                continue
              fi

              if [ "${head_branch}" != "${PR_HEAD_REF}" ]; then
                continue
              fi

              cancel_error_file="$(mktemp)"

              echo "Canceling stale ${run_name} run ${run_id} (${run_status}) for PR #${PR_NUMBER} at ${head_branch}@${head_sha}: ${html_url}"
              if gh api --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${REPOSITORY}/actions/runs/${run_id}/cancel" \
                2>"${cancel_error_file}"; then
                canceled=$((canceled + 1))
              else
                echo "::warning::Failed to cancel stale CI run ${run_id} for PR #${PR_NUMBER}; continuing."
                cat "${cancel_error_file}" >&2
                failed=$((failed + 1))
              fi

              rm -f "${cancel_error_file}"
            done <<< "${runs}"
          done

          echo "Canceled ${canceled} stale CI workflow run(s); ${failed} cancel request(s) failed."

  check:
    name: Check
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request head
        env:
          PR_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git init .
          git remote add origin "https://github.com/${PR_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${PR_SHA}"
          git checkout --force --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${PR_SHA}"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

  test:
    name: Test
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request head
        env:
          PR_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git init .
          git remote add origin "https://github.com/${PR_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${PR_SHA}"
          git checkout --force --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${PR_SHA}"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Test
        run: vp run test

  release_smoke:
    name: Release Smoke
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'codex/fix/') &&
      startsWith(github.event.pull_request.base.ref, 'staging/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request head
        env:
          PR_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git init .
          git remote add origin "https://github.com/${PR_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${PR_SHA}"
          git checkout --force --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${PR_SHA}"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts
